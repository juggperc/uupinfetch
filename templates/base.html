<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CS2 Price Scraper{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f0f12;
            --bg-elevated: #1a1a1f;
            --bg-hover: #22222a;
            --border: #25252b;
            --border-hover: #33333a;
            --text: #e8e8ec;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --radius: 8px;
            --radius-sm: 6px;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --space-2xl: 48px;
            --max-width: 1200px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            font-size: 14px;
        }

        /* Layout */
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--space-lg);
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(15, 15, 18, 0.95);
            border-bottom: 1px solid var(--border);
            height: 56px;
            display: flex;
            align-items: center;
        }

        .nav-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--space-lg);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .nav-logo-mark {
            width: 28px; height: 28px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: var(--space-lg);
            align-items: center;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            transition: color 0.15s;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text);
        }

        .nav-lang {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .nav-lang:hover {
            border-color: var(--border-hover);
            color: var(--text);
        }

        /* Main */
        .main {
            padding-top: 56px;
            min-height: 100vh;
        }

        /* Typography */
        h1 { font-size: 24px; font-weight: 700; line-height: 1.2; }
        h2 { font-size: 18px; font-weight: 600; line-height: 1.3; }
        h3 { font-size: 15px; font-weight: 600; line-height: 1.3; }

        /* Cards */
        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-lg);
            transition: border-color 0.15s;
        }

        .card:hover {
            border-color: var(--border-hover);
        }

        .card-sm {
            padding: var(--space-md);
        }

        .card-flat {
            background: transparent;
            border: 1px solid var(--border);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            border-color: var(--border-hover);
            background: var(--bg-hover);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Inputs */
        .input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.15s;
            outline: none;
        }

        .input:focus {
            border-color: var(--accent);
        }

        .input::placeholder {
            color: var(--text-muted);
        }

        /* Select */
        .select {
            padding: 8px 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .select:focus {
            border-color: var(--accent);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: var(--space-md);
        }

        .grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .grid-4 {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        /* Tags / Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .badge-steam { background: rgba(59, 130, 246, 0.12); color: #60a5fa; }
        .badge-buff { background: rgba(236, 72, 153, 0.12); color: #f472b6; }
        .badge-youpin { background: rgba(34, 197, 94, 0.12); color: #4ade80; }
        .badge-skinport { background: rgba(168, 85, 247, 0.12); color: #c084fc; }
        .badge-case { background: rgba(59, 130, 246, 0.12); color: #60a5fa; }
        .badge-sticker { background: rgba(236, 72, 153, 0.12); color: #f472b6; }
        .badge-skin { background: rgba(34, 197, 94, 0.12); color: #4ade80; }

        .badge-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        /* Stat number */
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: var(--space-sm);
        }

        /* List item */
        .list-item {
            padding: var(--space-md);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: var(--space-sm);
            transition: border-color 0.15s;
        }

        .list-item:hover {
            border-color: var(--border-hover);
        }

        /* Scrollable list */
        .list-scroll {
            max-height: 480px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Status dot */
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-success { background: var(--success); }
        .dot-warning { background: var(--warning); }
        .dot-danger { background: var(--danger); }

        /* Code block */
        .code-block {
            background: #111114;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-md);
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            overflow-x: auto;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Price */
        .price {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .price-lg {
            font-size: 28px;
        }

        /* Spacing helpers */
        .mt-md { margin-top: var(--space-md); }
        .mt-lg { margin-top: var(--space-lg); }
        .mt-xl { margin-top: var(--space-xl); }
        .mb-md { margin-bottom: var(--space-md); }
        .mb-lg { margin-bottom: var(--space-lg); }
        .mb-xl { margin-bottom: var(--space-xl); }
        .gap-sm { gap: var(--space-sm); }
        .gap-md { gap: var(--space-md); }
        .gap-lg { gap: var(--space-lg); }

        /* Flex */
        .flex { display: flex; }
        .flex-col { display: flex; flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .flex-wrap { flex-wrap: wrap; }
        .flex-1 { flex: 1; }

        /* Text */
        .text-secondary { color: var(--text-secondary); }
        .text-muted { color: var(--text-muted); }
        .text-sm { font-size: 12px; }
        .text-center { text-align: center; }
        .truncate {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links { gap: var(--space-md); }
            .nav-link { font-size: 12px; }
            .grid-2 { grid-template-columns: 1fr; }
            .container { padding: 0 var(--space-md); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <a href="/bot" class="nav-logo">
                <div class="nav-logo-mark">CS</div>
                <span data-i18n="appName">CS2 Scraper</span>
            </a>
            <div class="nav-links">
                <a href="/bot" class="nav-link{% if request.url.path == '/bot' %} active{% endif %}">Bot</a>
                <a href="/search" class="nav-link{% if request.url.path == '/search' %} active{% endif %}" data-i18n="navSearch">Search</a>
                <a href="/dashboard" class="nav-link{% if request.url.path == '/dashboard' %} active{% endif %}" data-i18n="navDashboard">Dashboard</a>
                <a href="/api/docs" class="nav-link">API</a>
                <button class="nav-lang" onclick="toggleLang()" id="langBtn">CN</button>
            </div>
        </div>
    </nav>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/i18n.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
