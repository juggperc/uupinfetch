{% extends "base.html" %}

{% block title %}Sign Up - CS2 Price Scraper{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 0 auto; padding: 6rem 2rem 4rem;">
    <div class="card" style="padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;" data-i18n="registerTitle">Create Account</h1>
            <p class="text-secondary text-sm" data-i18n="registerSubtitle">Get started with the scraper</p>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div style="margin-bottom: 1.25rem;">
                <label class="text-secondary text-sm" style="display: block; font-weight: 500; margin-bottom: 0.5rem;" data-i18n="name">Name</label>
                <input type="text" id="name" class="input" placeholder="Your name">
            </div>
            <div style="margin-bottom: 1.25rem;">
                <label class="text-secondary text-sm" style="display: block; font-weight: 500; margin-bottom: 0.5rem;" data-i18n="email">Email</label>
                <input type="email" id="email" required class="input" placeholder="you@example.com">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label class="text-secondary text-sm" style="display: block; font-weight: 500; margin-bottom: 0.5rem;" data-i18n="password">Password</label>
                <input type="password" id="password" required class="input" placeholder="Create a password" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;" data-i18n="registerBtn">Create Account</button>
        </form>

        <div id="registerError" style="display: none; margin-top: 1rem; padding: 0.75rem; background: var(--danger-dim); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius); color: var(--danger); font-size: 0.85rem; text-align: center;"></div>

        <div style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
            <span data-i18n="haveAccount">Already have an account?</span>
            <a href="/login" style="color: var(--accent); text-decoration: none; font-weight: 600;" data-i18n="loginLink">Sign In</a>
        </div>
    </div>
</div>

<script>
async function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('registerError');

    try {
        const res = await fetch('/api/v1/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, email, password}),
        });

        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('access_token', data.access_token);
            window.location.href = '/dashboard';
        } else {
            errorEl.textContent = data.detail || 'Registration failed';
            errorEl.style.display = 'block';
        }
    } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
    }
}
</script>
{% endblock %}
