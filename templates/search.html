{% extends "base.html" %}

{% block title %}Search - CS2 Price Scraper{% endblock %}

{% block content %}
<div class="container">
    <div class="mt-xl mb-lg text-center">
        <h1 class="mb-md" data-i18n="searchTitle">Search CS2 Items</h1>
        <div style="max-width:560px; margin:0 auto; position:relative;">
            <span style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px;">&#128269;</span>
            <input type="text" class="input" id="searchInput" placeholder="Search for AK-47, knives, gloves..."
                   data-i18n-placeholder="searchPlaceholder" onkeyup="if(event.key==='Enter') performSearch()"
                   style="padding-left:40px;">
        </div>
        <div class="flex items-center justify-center gap-sm mt-md flex-wrap">
            <button class="btn btn-primary" onclick="performSearch()" data-i18n="searchBtn">Search</button>
            <select id="sourceSelect" class="select">
                <option value="all" data-i18n="sourceAll">All Sources</option>
                <option value="steam" selected>Steam</option>
                <option value="buff">Buff163</option>
                <option value="youpin">Youpin</option>
                <option value="skinport">Skinport</option>
            </select>
        </div>
    </div>

    <div id="searchResults">
        <div id="loadingState" style="display:none; text-align:center; padding:var(--space-2xl);">
            <p class="text-secondary" data-i18n="loading">Loading...</p>
        </div>
        <div id="resultsGrid" class="grid"></div>
        <div id="noResults" style="display:none; text-align:center; padding:var(--space-2xl);">
            <p class="text-secondary" data-i18n="noResults">No items found. Try a different search.</p>
        </div>
    </div>

    <div id="pagination" class="flex items-center justify-center gap-sm mt-lg" style="display:none;">
        <button class="btn btn-secondary btn-sm" onclick="changePage(-1)" data-i18n="prev">Previous</button>
        <span id="pageInfo" class="text-secondary text-sm"></span>
        <button class="btn btn-secondary btn-sm" onclick="changePage(1)" data-i18n="next">Next</button>
    </div>
</div>

<script>
let currentPage = 1;
let currentQuery = '';
let totalResults = 0;

async function performSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    currentQuery = query;
    currentPage = 1;
    await fetchResults();
}

async function fetchResults() {
    const source = document.getElementById('sourceSelect').value;
    const loading = document.getElementById('loadingState');
    const grid = document.getElementById('resultsGrid');
    const noResults = document.getElementById('noResults');
    const pagination = document.getElementById('pagination');

    loading.style.display = 'block';
    grid.innerHTML = '';
    noResults.style.display = 'none';
    pagination.style.display = 'none';

    try {
        const response = await fetch(`/api/v1/items/search?q=${encodeURIComponent(currentQuery)}&source=${source}&page=${currentPage}&page_size=20`);
        const data = await response.json();
        loading.style.display = 'none';

        if (data.items && data.items.length > 0) {
            totalResults = data.total;
            renderResults(data.items);
            updatePagination(data.total, data.page, data.page_size);
        } else {
            noResults.style.display = 'block';
        }
    } catch (error) {
        loading.style.display = 'none';
        noResults.style.display = 'block';
        console.error('Search error:', error);
    }
}

function renderResults(items) {
    const grid = document.getElementById('resultsGrid');
    grid.innerHTML = items.map(item => {
        const badgeClass = item.source === 'buff' ? 'badge-buff' : item.source === 'steam' ? 'badge-steam' : item.source === 'skinport' ? 'badge-skinport' : 'badge-youpin';
        const sourceLabel = item.source === 'buff' ? 'Buff163' : item.source === 'steam' ? 'Steam' : item.source === 'skinport' ? 'Skinport' : 'Youpin';
        return `
            <div class="card card-sm" style="cursor:pointer;" onclick="window.location.href='/item/${encodeURIComponent(item.external_id)}?source=${item.source}'">
                <div class="flex gap-md">
                    <img src="${item.image_url || '/static/images/placeholder.png'}" alt="${item.name}"
                         style="width:72px; height:72px; object-fit:contain; border-radius:var(--radius-sm); background:#111114; flex-shrink:0;"
                         onerror="this.src='/static/images/placeholder.png'">
                    <div class="flex-col flex-1" style="min-width:0;">
                        <h3 class="truncate mb-sm">${item.name}</h3>
                        <div class="flex gap-sm flex-wrap mb-sm">
                            ${item.exterior ? `<span class="badge badge-outline">${item.exterior}</span>` : ''}
                            ${item.rarity ? `<span class="badge badge-outline">${item.rarity}</span>` : ''}
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="price">${item.price ? '\u00A5' + item.price : 'N/A'}</span>
                            <span class="badge ${badgeClass}">${sourceLabel}</span>
                        </div>
                        ${item.lease_unit_price ? `<div class="text-muted text-sm mt-sm">Lease: \u00A5${item.lease_unit_price}/day</div>` : ''}
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function updatePagination(total, page, pageSize) {
    const pagination = document.getElementById('pagination');
    const pageInfo = document.getElementById('pageInfo');
    const totalPages = Math.ceil(total / pageSize);
    pageInfo.textContent = `${page} / ${totalPages}`;
    pagination.style.display = 'flex';
}

function changePage(delta) {
    currentPage += delta;
    if (currentPage < 1) currentPage = 1;
    fetchResults();
}

document.getElementById('searchInput').focus();
</script>
{% endblock %}
