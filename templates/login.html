{% extends "base.html" %}

{% block title %}Login - Youpin CS2 Scraper{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 0 auto; padding: 6rem 2rem 4rem;">
    <div class="glass-strong" style="padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;" data-i18n="loginTitle">Welcome Back</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem;" data-i18n="loginSubtitle">Sign in to access your API keys and billing</p>
        </div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div style="margin-bottom: 1.25rem;">
                <label style="display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-secondary);" data-i18n="email">Email</label>
                <input type="email" id="email" required class="search-input" style="padding: 0.75rem 1rem;" placeholder="you@example.com">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-secondary);" data-i18n="password">Password</label>
                <input type="password" id="password" required class="search-input" style="padding: 0.75rem 1rem;" placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;" data-i18n="loginBtn">Sign In</button>
        </form>
        
        <div id="loginError" style="display: none; margin-top: 1rem; padding: 0.75rem; background: rgba(255,71,87,0.15); border: 1px solid rgba(255,71,87,0.3); border-radius: 8px; color: #ff4757; font-size: 0.85rem; text-align: center;"></div>
        
        <div style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
            <span data-i18n="noAccount">Don't have an account?</span>
            <a href="/register" style="color: var(--accent); text-decoration: none; font-weight: 600;" data-i18n="registerLink">Sign Up</a>
        </div>
    </div>
</div>

<script>
async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    
    try {
        const res = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password}),
        });
        
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('access_token', data.access_token);
            window.location.href = '/dashboard';
        } else {
            errorEl.textContent = data.detail || 'Login failed';
            errorEl.style.display = 'block';
        }
    } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
    }
}
</script>
{% endblock %}
